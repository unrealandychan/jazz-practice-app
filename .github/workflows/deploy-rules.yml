name: Deploy Firestore & Storage Rules

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'

jobs:
  deploy-rules:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Decode service account
        env:
          SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$SA_KEY" | base64 --decode > "${GITHUB_WORKSPACE}/sa.json"
          echo "Service account written"
      
      - name: Configure credentials
        run: |
          echo "::add-mask::${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}"
          export GOOGLE_APPLICATION_CREDENTIALS="${GITHUB_WORKSPACE}/sa.json"
          # optional: export FIREBASE_PROJECT_ID if you stored it separately
          # export FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}"

      - name: Deploy Firestore and Storage rules
        run: firebase deploy --only firestore:rules,firestore:indexes,storage --project "${{ secrets.FIREBASE_PROJECT_ID }}"